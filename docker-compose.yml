services:
  app:
    build:
      context: .
      dockerfile: dockerfile
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./src:/var/www/html
      - ./moodledata:/var/moodledata
      - ./aapico_2026.crt:/etc/ssl/certs/aapico_2026.crt
      - ./aapico_2026.key:/etc/ssl/private/aapico_2026.key
    environment:
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data
    depends_on:
      - db

  db:
    image: mariadb:10.6
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW --innodb-file-per-table=1 --innodb-large-prefix=ON
    volumes:
      - db_data:/var/lib/mysql
    environment:
      - MARIADB_DATABASE=moodle
      - MARIADB_USER=moodleuser
      - MARIADB_PASSWORD=moodlepass
      - MARIADB_ROOT_PASSWORD=moodlerootpass

volumes:
  db_data:
  moodledata:
